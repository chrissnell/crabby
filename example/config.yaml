# Crabby configuration — full example with all probe types and storage backends
#
# This file demonstrates every feature. In practice, enable only the storage
# backends you need and remove the rest.

general:
  request-timeout: 15s
  user-agent: "crabby-monitor/1.0"
  report-internal-metrics: true
  internal-metrics-gathering-interval: 15
  tags:
    environment: prod
    region: us-west-2

# ---------------------------------------------------------------------------
# Jobs — three probe types: simple, browser, and api
# ---------------------------------------------------------------------------
jobs:
  # Simple probes use Go's net/http client. Good for availability checks,
  # TTFB, DNS/TCP/TLS timing. Low resource usage.
  - name: github_homepage
    type: simple
    url: https://github.com/
    interval: 30
    tags:
      site: github

  - name: google_homepage
    type: simple
    url: https://www.google.com/
    interval: 30
    method: GET
    tags:
      site: google

  # Browser probes use headless Chrome via chromedp. They measure full page
  # load including DOM rendering and all sub-resources.
  - name: github_explore
    type: browser
    url: https://github.com/explore
    interval: 60
    headless: true
    tags:
      site: github
      probe: browser

  # API probes chain multiple HTTP requests. Responses from earlier steps
  # can be referenced in later steps using {{ step_name.field.path }} syntax.
  - name: github_api_workflow
    type: api
    interval: 60
    tags:
      site: github
      probe: api
    steps:
      - name: get_repos
        url: https://api.github.com/orgs/golang/repos?per_page=1
        method: GET
        header:
          Accept: application/vnd.github.v3+json
      - name: get_repo_detail
        url: https://api.github.com/repos/golang/{{ get_repos.0.name }}
        method: GET
        header:
          Accept: application/vnd.github.v3+json

# ---------------------------------------------------------------------------
# Browser backend — required only if you have browser-type jobs
# ---------------------------------------------------------------------------
browser:
  remote-url: http://localhost:9222
  headless: true

# ---------------------------------------------------------------------------
# Storage backends — enable the ones you need
# ---------------------------------------------------------------------------
storage:
  # Prometheus endpoint — scraped by your Prometheus server
  prometheus:
    listen-addr: "0.0.0.0:9090"
    metric-namespace: crabby

  # DogStatsD — compatible with the Datadog Agent
  dogstatsd:
    host: localhost
    port: 8125
    metric-namespace: crabby

  # InfluxDB v2 — direct HTTP writes
  influxdb:
    host: http://influxdb.example.com:8086
    token: my-influxdb-token
    # Or load the token from a file (useful for Kubernetes Secrets):
    # token-file: /run/secrets/influxdb-token
    org: my-org
    bucket: crabby
    metric-namespace: crabby

  # Splunk HTTP Event Collector
  splunk-hec:
    hec-url: https://splunk.example.com:8088/services/collector
    token: 12345678-1234-1234-1234-123456789012
    # token-file: /run/secrets/splunk-hec-token
    source: crabby
    host: crabby-prod-1
    metrics-source-type: crabby_metrics
    metrics-index: metrics
    events-source-type: crabby_events
    events-index: main

  # PagerDuty — creates incidents on 4xx/5xx responses
  pagerduty:
    routing-key: your-pagerduty-integration-key
    # routing-key-file: /run/secrets/pagerduty-routing-key
    event-namespace: crabby
    client: crabby
    event-duration: 1h

  # Log — write metrics and events to stdout, stderr, or a file
  log:
    file: stdout
    time:
      format: "2006/01/02 15:04:05"
      location: Local
    format:
      metric: "%time [M: %job] %timing: %value (%tags)\n"
      event: "%time [E: %name] status: %status (%tags)\n"
      tag: "%name: %value"
      tag-seperator: ", "
