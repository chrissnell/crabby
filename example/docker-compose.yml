services:
  crabby:
    image: ghcr.io/chrissnell/crabby:latest
    restart: unless-stopped
    environment:
      CRABBY_CONFIG: /config/config.yaml
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    ports:
      # Expose Prometheus metrics endpoint (if enabled in config)
      - "9090:9090"
