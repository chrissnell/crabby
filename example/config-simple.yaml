# Crabby configuration — simple probes only, no browser or Chrome required
#
# A minimal setup: lightweight HTTP probes reporting to Prometheus.

general:
  request-timeout: 15s
  tags:
    environment: prod

jobs:
  - name: github_homepage
    type: simple
    url: https://github.com/
    interval: 30
    tags:
      site: github

  - name: google_homepage
    type: simple
    url: https://www.google.com/
    interval: 30
    tags:
      site: google

  - name: google_dns
    type: simple
    url: https://dns.google/
    interval: 60
    tags:
      site: google-dns

storage:
  prometheus:
    listen-addr: "0.0.0.0:9090"
    metric-namespace: crabby
